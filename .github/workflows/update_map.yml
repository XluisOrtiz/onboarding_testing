name: Update Visual Product Map

on:
  schedule:
    - cron: '0 0 * * *' # Corre automáticamente cada medianoche
  workflow_dispatch:      # Permite el botón manual en la pestaña Actions

# Permisos necesarios para que el bot pueda escribir en el repositorio
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install Office365-REST-Python-Client pandas openpyxl

      - name: Run Generator
        env:
          SP_USERNAME: ${{ secrets.SP_USERNAME }}
          SP_PASSWORD: ${{ secrets.SP_PASSWORD }}
        run: python generate_map.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # El comando siguiente evita que el flujo falle si no hay cambios en el Excel
          git commit -m "Auto-update Product Map from SharePoint" || echo "No changes to commit"
          git push origin main
