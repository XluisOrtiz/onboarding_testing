name: Update Visual Product Map

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta automáticamente a las 12:00 AM
  workflow_dispatch:      # Permite ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install Office365-REST-Python-Client pandas openpyxl

      - name: Run Generator
        env:
          SP_USERNAME: ${{ secrets.SP_USERNAME }}
          SP_PASSWORD: ${{ secrets.SP_PASSWORD }}
        run: python generate_map.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'ProductMapBot'
          git config --global user.email 'bot@intel.com'
          git add PRODUCT_MAP.md
          git commit -m "Auto-update Product Map from SharePoint" || exit 0
          git push
